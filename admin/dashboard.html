<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Dashboard</title>

  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <main class="dashboard">

    <h2>Dashboard</h2>
    <p class="public-link">
      Public Page:
      <a href="../index.html" target="_blank">
        https://steig19.github.io/hike-tracker/index.html
      </a>
    </p>

    <h3 class="section-title">Trail Update:</h3>
    <form id="update-form">

      <label>
        Date
        <input type="date" id="update-date" required>
      </label>

      <label>
        Title
        <input type="text" id="update-title" maxlength="80" required>
      </label>

      <label>
        Mile Marker
        <input type="number" id="update-mile" step="0.1" required>
      </label>

      <label>
        Location (optional)
        <input type="text" id="update-location">
      </label>

      <label>
        Tags (comma separated)
        <input type="text" id="update-tags">
      </label>

      <label>
        Body (250 words max)
        <textarea id="update-body" rows="10" required></textarea>
        <div id="word-count">0 / 250 words</div>
      </label>

      <div class="slug-preview">
        Slug: <span id="slug-output">—</span>
      </div>

      <button type="button" id="generate-btn" disabled>
        Generate Markdown File
      </button>
      <div id="index-section" class="index-section" hidden>

        <h3>Index Entry</h3>
        <p class="index-instructions">
          Paste this at the TOP of the updates array in
          <code>/content/updates.index.json</code>
        </p>
  
        <textarea id="index-output" rows="8" readonly></textarea>
  
        <button type="button" id="copy-index-btn">
          Copy Index Entry
        </button>
      </div>

    </form>

    <hr />
    <section class="settings-section">

      <h3>Trail Configuration</h3>
    
      <label>
        Trail ID
        <input type="text" id="config-trail-id" placeholder="ice-age-trail-2025">
      </label>
    
      <label>
        Trail Name
        <input type="text" id="config-trail-name">
      </label>
    
      <label>
        Trail Length (miles)
        <input type="number" id="config-length-miles" step="1">
      </label>
    
      <label>
        Start Date
        <input type="date" id="config-start-date">
      </label>
    
      <label>
        End Date
        <input type="date" id="config-end-date">
      </label>
    
      <label>
        Units: Imperial (miles)
      </label>
    
      <h3>Stats Configuration:</h3>
    
      <label>
        Minimum Day Miles
        <input type="number" id="config-min-day-miles" step="1">
      </label>
    
      <label>
        Rolling Average Days
        <input type="number" id="config-rolling-avg-days" step="1">
      </label>
    
      <label>
        <input type="checkbox" id="config-include-nero">
        Include Nero Days in Calendar Average
      </label>
    
      <label>
        <input type="checkbox" id="config-include-zero">
        Include Zero Days in Calendar Average
      </label>

      <button type="button" id="load-config-btn">
        Load Existing trail.json
      </button>
      
      <button type="button" id="generate-config-btn">
        Generate trail.json
      </button>
    
      <textarea id="config-output" rows="12" readonly hidden></textarea>
    
    </section>

  </main>

  <script src="dashboard.js"></script>

</body>
</html>
