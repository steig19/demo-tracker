<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trail Dashboard</title>

  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>

  <main class="dashboard">

    <h1>Dashboard</h1>
    <p class="public-link">
      Public Page:
      <a href="../index.html" target="_blank">
        https://steig19.github.io/hike-tracker/index.html
      </a>
    </p>

    <form id="update-form">

      <label>
        Date
        <input type="date" id="update-date" required>
      </label>

      <label>
        Title
        <input type="text" id="update-title" maxlength="80" required>
      </label>

      <label>
        Mile Marker
        <input type="number" id="update-mile" step="0.1" required>
      </label>

      <label>
        Location (optional)
        <input type="text" id="update-location">
      </label>

      <label>
        Tags (comma separated)
        <input type="text" id="update-tags">
      </label>

      <label>
        Body (250 words max)
        <textarea id="update-body" rows="10" required></textarea>
        <div id="word-count">0 / 250 words</div>
      </label>

      <div class="slug-preview">
        Slug: <span id="slug-output">—</span>
      </div>

      <button type="button" id="generate-btn" disabled>
        Generate Markdown File
      </button>
      <div id="index-section" class="index-section" hidden>

        <h2>Index Entry</h2>
        <p class="index-instructions">
          Paste this at the TOP of the updates array in
          <code>/content/updates.index.json</code>
        </p>
  
        <textarea id="index-output" rows="8" readonly></textarea>
  
        <button type="button" id="copy-index-btn">
          Copy Index Entry
        </button>
      </div>

    </form>

  </main>

  <script src="dashboard.js"></script>

</body>
</html>
